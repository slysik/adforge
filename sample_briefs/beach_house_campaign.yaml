campaign:
  name: "Coastal Collection 2025"
  brand: "Blue Beach House Designs"
  message: "The perfect shell handbag for the season, complete with a lined interior, drawstring closure, and room for all your essentials."
  tagline: "Handcrafted Coastal Elegance"
  target_region: "Southern Florida — Naples & Palm Beach"
  target_audience: "Home decor designers, interior stylists, and coastal lifestyle enthusiasts, ages 30-60"

  languages:
    - en
    - es

  brand_guidelines:
    primary_colors:
      - "#1B4F72"   # Ocean blue
      - "#F5E6CA"   # Sandy beige
      - "#FFFFFF"    # White
    accent_color: "#D4A574"   # Shell tan / warm sand
    font_family: "Georgia"
    logo_path: "input_assets/logo.png"
    prohibited_words:
      - "cheap"
      - "fake"
      - "plastic"
      - "mass-produced"
    required_disclaimer: "Custom orders welcome — bluebeachhousedesigns.com"

  products:
    - id: "resort-shell-handbag"
      name: "Resort Shell Handbag"
      description: "Handcrafted rattan handbag adorned with natural seashells and floral accents, featuring a lined interior, drawstring closure, and room for all your essentials"
      hero_image: "input_assets/resort-shell-handbag.png"
      keywords:
        - shell handbag
        - rattan bag
        - coastal fashion
        - beach accessory
        - resort wear
        - handcrafted
        - seashell
        - luxury beach bag

    - id: "cowrie-shell-box"
      name: "Bespoke Rattan Cowrie Shell Box"
      description: "Hand-woven rattan keepsake box embellished with cowrie shells and turquoise accents, perfect for jewelry storage or coastal home decor"
      hero_image: "input_assets/bespoke-rattan-cowrie-shell-box.png"
      keywords:
        - cowrie shell
        - rattan box
        - keepsake box
        - coastal decor
        - home accessories
        - jewelry box
        - handwoven
        - beach house decor

    - id: "painted-shell-art"
      name: "Painted Shell Art"
      description: "Vibrant hand-painted seashell collection displayed in a gilded bamboo frame, featuring pastel rainbow scallops, starfish, and sand dollars — a statement piece for coastal interiors"
      hero_image: "input_assets/painted-shell-art.png"
      keywords:
        - shell art
        - wall art
        - coastal wall decor
        - painted shells
        - beach house art
        - framed art
        - pastel decor
        - statement piece

  aspect_ratios:
    - name: "instagram_square"
      ratio: "1:1"
      width: 1080
      height: 1080

    - name: "stories_reels"
      ratio: "9:16"
      width: 1080
      height: 1920

    - name: "facebook_landscape"
      ratio: "16:9"
      width: 1920
      height: 1080
