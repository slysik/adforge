campaign:
  name: "Holiday Glow 2025"
  brand: "Blue Beach House Designs"
  message: "Gift the Coast This Holiday Season"
  tagline: "Handcrafted Treasures from the Shore"
  target_region: "Southern Florida — Naples & Palm Beach"
  target_audience: "Gift buyers, interior designers, and home decor enthusiasts, ages 28-60"
  theme: "holiday coastal glow"

  languages:
    - en
    - fr
    - de

  brand_guidelines:
    primary_colors:
      - "#1B4F72"   # Ocean blue
      - "#F5E6CA"   # Sandy beige
      - "#FFFFFF"    # White
    accent_color: "#D4A574"
    font_family: "Georgia"
    logo_path: "input_assets/logo.png"
    prohibited_words:
      - "cheap"
      - "fake"
      - "plastic"
      - "mass-produced"
    required_disclaimer: "Custom orders welcome — bluebeachhousedesigns.com"

  products:
    - id: "resort-shell-handbag"
      name: "Resort Shell Handbag"
      description: "Handcrafted rattan handbag adorned with natural seashells and floral accents — the perfect gift for anyone who loves coastal style"
      hero_image: "input_assets/resort-shell-handbag.png"
      keywords:
        - shell handbag
        - holiday gift
        - coastal fashion
        - resort wear
        - handcrafted
        - luxury beach bag

    - id: "cowrie-shell-box"
      name: "Bespoke Rattan Cowrie Shell Box"
      description: "Hand-woven rattan keepsake box with cowrie shells and turquoise accents — a meaningful holiday gift for jewelry lovers"
      hero_image: "input_assets/bespoke-rattan-cowrie-shell-box.png"
      keywords:
        - cowrie shell
        - gift box
        - holiday gift
        - coastal decor
        - keepsake box
        - handwoven

    - id: "painted-shell-art"
      name: "Painted Shell Art"
      description: "Vibrant hand-painted seashell collection in a gilded bamboo frame — a statement piece that brings the beach indoors"
      hero_image: "input_assets/painted-shell-art.png"
      keywords:
        - shell art
        - wall art
        - holiday decor
        - coastal art
        - framed art
        - statement piece

  aspect_ratios:
    - name: "instagram_square"
      ratio: "1:1"
      width: 1080
      height: 1080

    - name: "stories_reels"
      ratio: "9:16"
      width: 1080
      height: 1920

    - name: "facebook_landscape"
      ratio: "16:9"
      width: 1920
      height: 1080
